name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 0.2.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use newest installed Xcode (Swift 6 toolchain)
        run: |
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)"
          [ -n "$XC" ] && sudo xcode-select -s "$XC"
          swift --version

      - name: Resolve version
        id: v
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            # push sur main : bump automatique du patch depuis le dernier tag
            LAST="$(git tag -l 'v*' --sort=-v:refname | head -1)"
            LAST="${LAST#v}"
            LAST="${LAST:-0.0.0}"
            MAJOR="${LAST%%.*}"
            REST="${LAST#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST#*.}"
            V="$MAJOR.$MINOR.$((PATCH + 1))"
            git tag "v$V"
            git push origin "v$V"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build app + DMG
        run: bash package.sh "${{ steps.v.outputs.version }}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.v.outputs.version }}"
          DMG="dist/Cubby-$V.dmg"
          if gh release view "v$V" >/dev/null 2>&1; then
            gh release upload "v$V" "$DMG" --clobber
          else
            gh release create "v$V" --title "Cubby $V" \
              --notes "Automated release. Open the DMG and drag Cubby into Applications. Cubby is ad-hoc signed (not notarized): on first launch, open System Settings › Privacy & Security and click Open Anyway (on macOS 14, right-click Cubby.app › Open). Requires macOS 14+." \
              "$DMG"
          fi
